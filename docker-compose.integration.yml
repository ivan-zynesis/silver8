# Integration test orchestration (DEC-029).
# Same shape as the production deployment recipe — replace `coinbase-mock` with
# the real venue and replace `docker compose` with the production orchestrator
# (Fly Machines, Cloud Run, k8s) and you have production. The mock here makes
# the recipe runnable in CI without network dependencies.

services:
  coinbase-mock:
    build:
      context: .
      dockerfile: apps/coinbase-mock/Dockerfile
    container_name: silver8-coinbase-mock
    environment:
      MOCK_WS_PORT: "8765"
      MOCK_CONTROL_PORT: "8766"
      MOCK_RATE_HZ: "20"
      MOCK_LOOP: "true"
    ports:
      - "8765:8765"
      - "8766:8766"
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://localhost:8766/control/state').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 1s

  hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: silver8-hub
    depends_on:
      coinbase-mock:
        condition: service_healthy
    environment:
      MODE: monolith
      HTTP_PORT: "3000"
      WS_PORT: "3001"
      MCP_TRANSPORT: http
      LOG_LEVEL: warn
      INGESTION_LIFECYCLE: demand_driven
      INGESTION_SOCKET_IDLE_MS: "2000"
      COINBASE_WS_URL: "ws://coinbase-mock:8765"
      DRAIN_DEADLINE_MS: "5000"
    ports:
      - "3000:3000"
      - "3001:3001"
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://localhost:3000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 2s
    stop_grace_period: 7s
